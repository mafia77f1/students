name: Build & Export App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build static web app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build

      - name: Zip build artifact
        run: |
          cd dist
          zip -r ../tullab-web-${{ github.sha }}.zip .

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: tullab-web-${{ github.sha }}
          path: tullab-web-${{ github.sha }}.zip
          retention-days: 30

      - name: Upload raw dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  android:
    name: Wrap as Android APK (Capacitor)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Capacitor
        run: |
          npm i -D @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "طلاب" "app.tullab.app" --web-dir=dist || true
          npx cap add android || true
          npx cap sync android

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tullab-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
